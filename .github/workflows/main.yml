name: Update GitHub Readme Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate All Stats Cards
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: profile/ # Tất cả ảnh sẽ vào thư mục này
          options: theme=dark&username=Ewad245
        # Lưu ý: Action này sẽ tự tạo các file stats.svg và top-langs.svg

      # Vì thẻ Streak Stats dùng một công cụ khác, bạn có thể dùng link mirror ổn định
      # hoặc tạm thời dùng link trực tiếp nếu chưa muốn cài thêm Action phức tạp.

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          mkdir -p profile
          git add profile/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update all github stats"
            git push origin main
          fi
